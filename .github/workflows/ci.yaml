name: CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/**'
      - 'k8s/**'
      - 'README.md'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - name: Build
        run: go build -o web-app

      - name: Test
        run: go test ./...

  code-quality:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  push:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ✅ Debug AWS identity
      - name: Verify AWS Identity
        run: |
          echo "===== AWS CALLER ID ====="
          aws sts get-caller-identity

      # ✅ Validate account ID
      - name: Validate AWS Account ID
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          REAL_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          echo "Real Account: $REAL_ACCOUNT_ID"
          echo "Secret Account: $AWS_ACCOUNT_ID"

          if [ "$REAL_ACCOUNT_ID" != "$AWS_ACCOUNT_ID" ]; then
            echo "❌ ERROR: AWS_ACCOUNT_ID does not match credentials"
            exit 1
          fi

      # ✅ Build, login, tag, push
      - name: Build, tag, and push image to ECR
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ap-south-1
          IMAGE_TAG: ${{ github.run_id }}
        run: |
          set -e

          IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/web-app:$IMAGE_TAG

          echo "Using IMAGE_URI=$IMAGE_URI"

          echo "Logging into ECR..."
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

          echo "Building image..."
          docker build -t web-app .

          echo "Tagging image..."
          docker tag web-app:latest $IMAGE_URI

          echo "Pushing image..."
          docker push $IMAGE_URI

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update tag in Helm chart
        run: |
          sed -i "s/tag: .*/tag: \"${{ github.run_id }}\"/" helm/web-app-chart/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "jaswanthgorantla02@gmail.com"
          git config --global user.name "jaswanth"

          git add helm/web-app-chart/values.yaml
          git diff --cached --quiet || git commit -m "Update tag to ${{ github.run_id }}"
          git push